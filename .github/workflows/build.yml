name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-x64:
    name: Windows x64 · ${{ matrix.configuration }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Configure
        run: cmake -S . -B build -A x64

      - name: Build
        run: cmake --build build --config ${{ matrix.configuration }} --parallel

      - name: Test
        run: ctest --test-dir build -C ${{ matrix.configuration }} --output-on-failure

      - name: Package
        if: matrix.configuration == 'Release'
        shell: pwsh
        run: ./scripts/build.ps1 -Configuration Release -Package

      - name: Upload package
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@v7
        with:
          name: NppQuickReplace-x64
          path: |
            build/NppQuickReplace-*.zip
            build/SHA256SUMS.txt
          if-no-files-found: error